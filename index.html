<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teen Patti Recovery</title>
  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:#fff; margin:0; padding:20px; }
    .card { max-width:520px; margin:20px auto; background:#1e293b; padding:20px; border-radius:12px; }
    input, button { width:100%; padding:10px; margin-top:8px; border-radius:8px; border:none; }
    input { background:#334155; color:#fff; }
    button { background:#2563eb; color:#fff; font-weight:bold; cursor:pointer; }
    .hidden { display:none; }
    .link { color:#93c5fd; text-decoration:underline; cursor:pointer; margin-top:12px; display:block; text-align:center; }
  </style>
</head>
<body>
  <div id="setupScreen" class="card">
    <h2>Join Table</h2>
    <label>Name</label>
    <input id="playerNameInput" placeholder="Enter name" />
    <label>Table Code</label>
    <input id="tableCodeInput" placeholder="e.g. GOLD77" />
    <div id="adminPassGroup" class="hidden">
      <label>Admin Passcode</label>
      <input id="adminPassInput" type="password" placeholder="Enter admin pass" />
    </div>
    <button onclick="connectToTable()">Enter Table</button>
    <span id="toggleText" class="link" onclick="toggleAdminField()">Login as Table Admin</span>
  </div>

  <div id="gameScreen" class="card hidden">
    <h2>Game Screen</h2>
    <p>Table: <span id="displayTableCode"></span></p>
    <p id="turnIndicator">Recovery mode loaded successfully.</p>
  </div>

  <script>
    const ADMIN_SECRET_KEY = "CHIPS77";
    let isAdminLoggingIn = false;

    function toggleAdminField() {
      isAdminLoggingIn = !isAdminLoggingIn;
      const group = document.getElementById("adminPassGroup");
      const text = document.getElementById("toggleText");
      group.classList.toggle("hidden", !isAdminLoggingIn);
      text.innerText = isAdminLoggingIn
        ? "Log in as Standard Player instead"
        : "Login as Table Admin";
    }

    function connectToTable() {
      const name = document.getElementById("playerNameInput").value.trim();
      const code = document.getElementById("tableCodeInput").value.trim().toUpperCase();
      if (!name || !code) return alert("Enter name and table code");

      if (isAdminLoggingIn) {
        const pass = document.getElementById("adminPassInput").value.trim();
        if (pass !== ADMIN_SECRET_KEY) return alert("Incorrect Admin Passcode");
      }

      document.getElementById("setupScreen").classList.add("hidden");
      document.getElementById("displayTableCode").innerText = code;
      document.getElementById("gameScreen").classList.remove("hidden");
      document.getElementById("turnIndicator").innerText = `Welcome ${name}. UI is working.`;
    }
  </script>
</body>
</html>
