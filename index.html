<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Teen Patti Companion Pro</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #334155; }
        h1, h2, h3 { margin-top: 0; color: #fbbf24; text-align: center; }
        .pot-display { font-size: 32px; text-align: center; font-weight: bold; color: #4ade80; background: #064e3b; padding: 15px; border-radius: 8px; border: 2px solid #059669; }
        .input-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; }
        input { background: #334155; color: #fff; border: 1px solid #475569; padding: 10px; border-radius: 6px; font-size: 16px; }
        button { background: #2563eb; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; transition: background 0.2s; }
        button:disabled { background: #475569; cursor: not-allowed; opacity: 0.3; }
        button.blind-btn { background: #d97706; }
        button.chaal-btn { background: #059669; }
        button.fold-btn { background: #dc2626; }
        
        /* Bet Size Tabs styling */
        .bet-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .bet-tab { background: #334155; border: 2px solid #475569; padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; flex: 1; cursor: pointer; transition: all 0.2s; }
        .bet-tab.selected { background: #2563eb; border-color: #3b82f6; color: #fff; transform: scale(1.03); }
        .bet-tab.disabled-tab { opacity: 0.25; cursor: not-allowed; background: #1e293b; border-color: #334155; }
        
        /* Players list layout modifications */
        .player-badge { display: flex; justify-content: space-between; padding: 12px; background: #334155; border-radius: 6px; margin-bottom: 8px; align-items: center; border: 2px solid transparent; }
        .active-turn { border: 2px solid #fbbf24; background: #1e3a8a; }
        .history-text { font-size: 11px; color: #94a3b8; margin-top: 4px; font-family: monospace; }
        .status-bar { text-align: center; color: #94a3b8; font-weight: bold; font-size: 16px; margin-top: 5px; background: #1e293b; padding: 10px; border-radius: 6px; border: 1px solid #475569; }
        .hidden { display: none; }
        .flex-row { display: flex; gap: 10px; margin-top: 10px; }
        .admin-crown-btn { background: #fbbf24; color: #000; font-size: 12px; padding: 6px 10px; width: auto; border-radius: 4px; font-weight: bold; margin-bottom: 4px; }
        .admin-buyin-btn { background: #6b7280; color: #fff; font-size: 11px; padding: 4px 8px; width: auto; border-radius: 4px; margin-right: 4px; }
        .badge-left { display: flex; flex-direction: column; }
        .controls-right { display: flex; flex-direction: column; align-items: flex-end; }

        /* GIANT MEGA POPUP OVERLAY SYSTEM */
        .mega-popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; text-align: center; padding: 20px; box-sizing: border-box; }
        .mega-winner-title { font-size: 28px; color: #fbbf24; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 10px; }
        .mega-winner-name { font-size: 72px; font-weight: 900; color: #ffffff; text-shadow: 0 0 30px rgba(251,191,36,0.6); margin: 20px 0; text-transform: uppercase; word-wrap: break-word; max-width: 100%; }
        .mega-winner-pot { font-size: 42px; color: #4ade80; font-weight: bold; }
        .mega-close-btn { margin-top: 40px; background: #fbbf24; color: #000; width: auto; padding: 15px 40px; font-size: 18px; border-radius: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>♠ Teen Patti Companion ♠</h1>

    <div id="setupScreen" class="card">
        <h2>Join a Table</h2>
        <div class="input-group">
            <label>Your Name</label>
            <input type="text" id="playerNameInput" placeholder="Enter name...">
        </div>
        <div class="input-group">
            <label>Table Code</label>
            <input type="text" id="tableCodeInput" placeholder="e.g. GOLD77">
        </div>
        <button onclick="connectToTable()">Enter Table</button>
    </div>

    <div id="gameScreen" class="hidden">
        <div class="card" style="padding: 10px 20px;">
            <h3 style="margin: 0; text-align: left; font-size:14px; color:#94a3b8;">Table Code: <span id="displayTableCode" style="color:#fff;"></span> <span id="adminBadge" style="color:#fbbf24; margin-left:10px; font-size:12px; display:none;">(★ You are Admin)</span></h3>
        </div>

        <div class="status-bar" id="turnIndicator">Waiting for game initiation...</div>
        <br>

        <div class="card">
            <h3>Current Pot</h3>
            <div class="pot-display">€<span id="potValue">0</span></div>
            <div id="minChaalNotice" style="text-align: center; margin-top: 8px; font-size: 13px; color: #cbd5e1; font-weight: 500;">Minimum Chaal Requirement: €2</div>
        </div>

        <div id="actionPad" class="card">
            <h3>Your Turn Actions</h3>
            <label style="display:block; margin-bottom: 6px; font-size: 14px; color: #cbd5e1;">Select Chaal Amount:</label>
            <div class="bet-tabs">
                <div class="bet-tab selected" onclick="selectBetTab(2)" id="tab-2">€2</div>
                <div class="bet-tab" onclick="selectBetTab(3)" id="tab-3">€3</div>
                <div class="bet-tab" onclick="selectBetTab(4)" id="tab-4">€4</div>
                <div class="bet-tab" onclick="selectBetTab(5)" id="tab-5">€5</div>
            </div>
            
            <div class="flex-row">
                <button id="blindActionBtn" class="blind-btn" onclick="submitMove('Blind')">Blind (€1)</button>
                <button id="chaalActionBtn" class="chaal-btn" onclick="submitMove('Chaal')">Chaal</button>
                <button class="fold-btn" onclick="submitMove('Fold')">Fold</button>
            </div>
        </div>

        <div class="card">
            <h3>Players & History</h3>
            <div id="playerList"></div>
            
            <button id="startHandBtn" style="background:#7c3aed; margin-top:15px; display:none;" onclick="hostResetHand()">♥ Start Next Hand ♥</button>
            <button id="downloadExcelBtn" style="background:#0284c7; margin-top:8px; display:none;" onclick="exportToExcel()">📊 Download Excel Summary</button>
        </div>
    </div>
</div>

<div id="giantWinnerPopup" class="mega-popup-overlay hidden">
    <div style="font-size: 80px; margin-bottom: 10px;">🏆</div>
    <div class="mega-winner-title">ROUND WINNER</div>
    <div class="mega-winner-name" id="giantWinnerName">PLAYER NAME</div>
    <div class="mega-winner-pot">COLLECTED €<span id="giantWinnerPot">0</span></div>
    <button class="mega-close-btn" onclick="closeMegaPopup()">Dismiss Window</button>
</div>

<script>
    // --- CONFIGURATION ---
    const ABLY_API_KEY = 'YOUR_ABLY_API_KEY_HERE'; 

    let ably, channel;
    let roomCode = "";
    let myClientId = "";
    let myName = "";
    let currentSelectedBet = 2; 
    
    // --- GAME ENGINE STATE ---
    let gameState = {
        adminId: "",       
        players: [],       // Array of { id, name, wallet: 0 (Default), blindsCount, folded, wins, losses }
        pot: 0,
        turnIndex: 0,
        handActive: false,
        minimumRequiredChaal: 2 // Escalates depending on active choices made inside current hand round
    };

    function connectToTable() {
        myName = document.getElementById('playerNameInput').value.trim();
        roomCode = document.getElementById('tableCodeInput').value.trim().toUpperCase();
        
        if(!myName || !roomCode) {
            alert("Please provide both your Name and a Table Code.");
            return;
        }

        myClientId = 'id_' + Math.random().toString(36).substr(2, 9);

        if(ABLY_API_KEY === 'YOUR_ABLY_API_KEY_HERE') {
            alert("Please update the ABLY_API_KEY variable inside the script source to enable multiplayer capability.");
            return;
        }

        ably = new Ably.Realtime({ key: ABLY_API_KEY, clientId: myClientId });
        channel = ably.channels.get('teen-patti-' + roomCode);

        channel.subscribe('stateUpdate', (message) => {
            gameState = message.data;
            updateGameUI();
        });

        // Listen for sudden overlay triggers from the dealer's panel
        channel.subscribe('victoryEvent', (message) => {
            triggerGiantVictoryDisplay(message.data.name, message.data.potAmount);
        });

        channel.presence.subscribe('enter', (member) => {
            if(myClientId === gameState.adminId) { 
                syncJoiner(member.clientId, member.data.name);
            }
        });

        channel.presence.enter({ name: myName });

        channel.presence.get((err, members) => {
            if(!err && gameState.players.length === 0) {
                gameState.adminId = myClientId; 
                members.forEach(m => {
                    if(!gameState.players.find(p => p.id === m.clientId)) {
                        gameState.players.push({ id: m.clientId, name: m.data.name, wallet: 0, blindsCount: 0, folded: false, wins: 0, losses: 0 });
                    }
                });
                broadcastState();
            }
        });

        document.getElementById('setupScreen').classList.add('hidden');
        document.getElementById('displayTableCode').innerText = roomCode;
        document.getElementById('gameScreen').classList.remove('hidden');
    }

    function syncJoiner(id, name) {
        if(!gameState.players.find(p => p.id === id)) {
            gameState.players.push({ id: id, name: name, wallet: 0, blindsCount: 0, folded: false, wins: 0, losses: 0 });
            broadcastState();
        }
    }

    function selectBetTab(val) {
        if(val < gameState.minimumRequiredChaal) return; // Prevent selection of locked steps
        currentSelectedBet = val;
        for(let i=2; i<=5; i++) {
            document.getElementById(`tab-${i}`).classList.remove('selected');
        }
        document.getElementById(`tab-${val}`).classList.add('selected');
    }

    function broadcastState() {
        channel.publish('stateUpdate', gameState);
    }

    function updateGameUI() {
        document.getElementById('potValue').innerText = gameState.pot;
        document.getElementById('minChaalNotice').innerText = `Minimum Chaal Requirement: €${gameState.minimumRequiredChaal}`;
        
        const listContainer = document.getElementById('playerList');
        listContainer.innerHTML = '';

        const isAdmin = (myClientId === gameState.adminId);
        
        if(isAdmin) {
            document.getElementById('adminBadge').style.display = "inline";
            document.getElementById('startHandBtn').style.display = "block";
            document.getElementById('downloadExcelBtn').style.display = "block";
        }

        if(gameState.players.length === 0) return;

        let activePlayerObj = gameState.players[gameState.turnIndex];

        // RENDER TURN PENDING HEADER
        if(gameState.handActive && activePlayerObj) {
            document.getElementById('turnIndicator').innerText = `PENDING TURN: ${activePlayerObj.name.toUpperCase()}`;
            document.getElementById('turnIndicator').style.color = (activePlayerObj.id === myClientId) ? "#fbbf24" : "#a7f3d0";
        } else {
            document.getElementById('turnIndicator').innerText = "Waiting for Admin to credit buy-ins / start next hand...";
            document.getElementById('turnIndicator').style.color = "#94a3b8";
        }

        // EVALUATE TAB RESTRICTION RENDERS FOR CURRENT PLAYER CONTEXT
        for(let i=2; i<=5; i++) {
            let el = document.getElementById(`tab-${i}`);
            if(i < gameState.minimumRequiredChaal) {
                el.classList.add('disabled-tab');
                el.classList.remove('selected');
            } else {
                el.classList.remove('disabled-tab');
            }
        }
        // Force selection adjust if previous pick falls below escalated floor limits
        if(currentSelectedBet < gameState.minimumRequiredChaal) {
            selectBetTab(gameState.minimumRequiredChaal);
        }

        // RENDER ROSTER ROWS
        gameState.players.forEach((p) => {
            const isCurrent = (gameState.handActive && activePlayerObj && activePlayerObj.id === p.id);
            const statusLabel = p.folded ? "FOLDED" : (p.blindsCount < 2 ? `Blinds left: ${2 - p.blindsCount}` : "Chaal Only");
            
            const div = document.createElement('div');
            div.className = `player-badge ${isCurrent ? 'active-turn' : ''}`;
            
            let htmlContent = `
                <div class="badge-left">
                    <strong>${p.name} ${p.id === myClientId ? '(You)' : ''}</strong>
                    <div style="font-size:12px; color:#cbd5e1;">Bal: €${p.wallet} | <span style="color:#f3f4f6;">${statusLabel}</span></div>
                    <div class="history-text">Hst: W:${p.wins} | L:${p.losses}</div>
                </div>
                <div class="controls-right">
            `;

            // Render interactive buy-in options for Admin
            if(isAdmin) {
                if(gameState.handActive && !p.folded) {
                    htmlContent += `<button class="admin-crown-btn" onclick="adminDeclareWinner('${p.id}')">🏆 Award Win</button>`;
                }
                htmlContent += `
                    <div>
                        <button class="admin-buyin-btn" onclick="adminAddChips('${p.id}', 10)">+€10</button>
                        <button class="admin-buyin-btn" onclick="adminAddChips('${p.id}', 50)">+€50</button>
                    </div>
                `;
            } else if (isCurrent) {
                htmlContent += `<div style="font-weight:bold; color:#fbbf24; font-size:13px;">⏳ Current</div>`;
            }

            htmlContent += `</div>`;
            div.innerHTML = htmlContent;
            listContainer.appendChild(div);
        });

        // LOCK CONTROLS FOR NON-TURN USERS
        if(gameState.handActive && activePlayerObj && activePlayerObj.id === myClientId) {
            document.getElementById('actionPad').style.opacity = "1";
            setInteractiveInputs(false, activePlayerObj);
        } else {
            document.getElementById('actionPad').style.opacity = "0.4";
            setInteractiveInputs(true, null);
        }
    }

    function setInteractiveInputs(disableAll, playerObj) {
        document.getElementById('blindActionBtn').disabled = disableAll || (playerObj && playerObj.blindsCount >= 2) || (gameState.minimumRequiredChaal > 2);
        document.getElementById('chaalActionBtn').disabled = disableAll;
        document.getElementById('actionPad').style.pointerEvents = disableAll ? "none" : "auto";
    }

    function adminAddChips(playerId, amount) {
        if(myClientId !== gameState.adminId) return;
        const player = gameState.players.find(p => p.id === playerId);
        if(player) {
            player.wallet += amount;
            broadcastState();
        }
    }

    function hostResetHand() {
        if(myClientId !== gameState.adminId) return;

        // Verify players have balance to match the baseline boot
        let brokePlayers = gameState.players.filter(p => p.wallet < 1);
        if(brokePlayers.length > 0) {
            alert(`Cannot start hand! The following players need a coin buy-in: ${brokePlayers.map(p=>p.name).join(', ')}`);
            return;
        }

        gameState.pot = 0;
        gameState.minimumRequiredChaal = 2; // Floor resetting to step 1
        gameState.players.forEach(p => {
            p.folded = false;
            p.blindsCount = 0;
            p.wallet -= 1; 
            gameState.pot += 1;
        });
        gameState.turnIndex = 0;
        gameState.handActive = true;
        broadcastState();
    }

    function submitMove(moveType) {
        let currentPlayer = gameState.players[gameState.turnIndex];
        if (currentPlayer.id !== myClientId) return;

        let betSize = 0;

        if (moveType === 'Blind') {
            betSize = 1; 
            currentPlayer.blindsCount++;
        } else if (moveType === 'Chaal') {
            betSize = currentSelectedBet;
            // Update active floor rule tracker across table ecosystem
            if(betSize > gameState.minimumRequiredChaal) {
                gameState.minimumRequiredChaal = betSize;
            }
        } else if (moveType === 'Fold') {
            currentPlayer.folded = true;
        }

        if(currentPlayer.wallet < betSize) {
            alert("Insufficient chips! Buy in from Dealer/Admin.");
            return;
        }

        currentPlayer.wallet -= betSize;
        gameState.pot += betSize;

        advanceTurn();
        broadcastState();
    }

    function adminDeclareWinner(winnerId) {
        if(myClientId !== gameState.adminId) return;

        const winner = gameState.players.find(p => p.id === winnerId);
        if(!winner) return;

        let totalPotWon = gameState.pot;
        winner.wallet += totalPotWon;
        winner.wins += 1;

        gameState.players.forEach(p => {
            if(p.id !== winnerId) {
                p.losses += 1;
            }
        });

        gameState.pot = 0;
        gameState.handActive = false;

        // Broadcast to trigger the full-screen cinematic banner for everyone
        channel.publish('victoryEvent', { name: winner.name, potAmount: totalPotWon });
        broadcastState();
    }

    function triggerGiantVictoryDisplay(name, amount) {
        document.getElementById('giantWinnerName').innerText = name;
        document.getElementById('giantWinnerPot').innerText = amount;
        document.getElementById('giantWinnerPopup').classList.remove('hidden');
    }

    function closeMegaPopup() {
        document.getElementById('giantWinnerPopup').classList.add('hidden');
    }

    function advanceTurn() {
        let attempts = 0;
        do {
            gameState.turnIndex = (gameState.turnIndex + 1) % gameState.players.length;
            attempts++;
        } while(gameState.players[gameState.turnIndex].folded && attempts < gameState.players.length);
    }

    // EXCEL SHEET EXTRACT UTILITY
    function exportToExcel() {
        if(gameState.players.length === 0) return;
        
        // Format live player records into structural spreadsheet rows
        let formattedData = gameState.players.map(p => ({
            "Player Name": p.name,
            "Current Wallet Balance (€)": p.wallet,
            "Total Wins Handled": p.wins,
            "Total Losses Handled": p.losses
        }));

        let worksheet = XLSX.utils.json_to_sheet(formattedData);
        let workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Session Results");

        // Force browser download pipeline execution
        XLSX.writeFile(workbook, `Teen_Patti_Table_${roomCode}_Report.xlsx`);
    }
</script>

</body>
</html>
