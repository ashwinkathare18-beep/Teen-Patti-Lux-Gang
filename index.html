<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Teen Patti Companion</title>
    <!-- Include Ably Realtime SDK for syncing moves instantly across phones -->
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #334155; }
        h1, h2, h3 { margin-top: 0; color: #fbbf24; text-align: center; }
        .pot-display { font-size: 32px; text-align: center; font-weight: bold; color: #4ade80; background: #064e3b; padding: 15px; border-radius: 8px; border: 2px solid #059669; }
        .input-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; }
        input { background: #334155; color: #fff; border: 1px solid #475569; padding: 10px; border-radius: 6px; font-size: 16px; }
        button { background: #2563eb; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #475569; cursor: not-allowed; opacity: 0.4; }
        button.blind-btn { background: #d97706; }
        button.chaal-btn { background: #059669; }
        button.fold-btn { background: #dc2626; }
        
        /* Bet Size Tabs styling */
        .bet-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .bet-tab { background: #334155; border: 2px solid #475569; padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; flex: 1; cursor: pointer; transition: all 0.2s; }
        .bet-tab.selected { background: #2563eb; border-color: #3b82f6; color: #fff; transform: scale(1.03); }
        
        /* Players list layout modifications */
        .player-badge { display: flex; justify-content: space-between; padding: 12px; background: #334155; border-radius: 6px; margin-bottom: 8px; align-items: center; border: 2px solid transparent; }
        .active-turn { border: 2px solid #fbbf24; background: #1e3a8a; }
        .history-text { font-size: 11px; color: #94a3b8; margin-top: 4px; font-family: monospace; }
        .status-bar { text-align: center; color: #94a3b8; font-weight: bold; font-size: 16px; margin-top: 5px; background: #1e293b; padding: 10px; border-radius: 6px; border: 1px solid #475569; }
        .hidden { display: none; }
        .flex-row { display: flex; gap: 10px; margin-top: 10px; }
        .admin-action-btn { background: #64748b; color: #000; font-size: 12px; padding: 6px 10px; width: auto; border-radius: 4px; margin-top: 6px; }
        .admin-crown-btn { background: #fbbf24; }
        .dealer-coin-btn { background: #4ade80; }
        .badge-left { display: flex; flex-direction: column; }
    </style>
</head>
<body>

<div class="container">
    <h1>♠ Teen Patti Companion ♠</h1>

    <!-- SECTION 1: JOIN/CREATE ROOM -->
    <div id="setupScreen" class="card">
        <h2>Join a Table</h2>
        <div class="input-group">
            <label>Your Name</label>
            <input type="text" id="playerNameInput" placeholder="Enter name...">
        </div>
        <div class="input-group">
            <label>Table Code</label>
            <input type="text" id="tableCodeInput" placeholder="e.g. GOLD77">
        </div>
        <button onclick="connectToTable()">Enter Table</button>
    </div>

    <!-- SECTION 2: LIVE GAMEBOARD -->
    <div id="gameScreen" class="hidden">
        <div class="card" style="padding: 10px 20px;">
            <h3 style="margin: 0; text-align: left; font-size:14px; color:#94a3b8;">Table Code: <span id="displayTableCode" style="color:#fff;"></span> <span id="adminBadge" style="color:#fbbf24; display:none; font-size:12px;">[ADMIN]</span></h3>
        </div>

        <!-- NEW PENDING TURN DISPLAY -->
        <div class="status-bar" id="turnIndicator">Waiting for game initiation...</div>
        <br>

        <div class="card">
            <h3>Current Pot</h3>
            <div class="pot-display">€<span id="potValue">0</span></div>
        </div>

        <!-- ACTION PAD -->
        <div id="actionPad" class="card">
            <h3>Your Turn Actions</h3>
            <label style="display:block; margin-bottom: 6px; font-size: 14px; color: #cbd5e1;">Select Chaal Amount:</label>
            <div class="bet-tabs">
                <div class="bet-tab selected" onclick="selectBetTab(2)" id="tab-2">€2</div>
                <div class="bet-tab" onclick="selectBetTab(3)" id="tab-3">€3</div>
                <div class="bet-tab" onclick="selectBetTab(4)" id="tab-4">€4</div>
                <div class="bet-tab" onclick="selectBetTab(5)" id="tab-5">€5</div>
            </div>
            
            <div class="flex-row">
                <button id="blindActionBtn" class="blind-btn" onclick="submitMove('Blind')">Blind (€1)</button>
                <button id="chaalActionBtn" class="chaal-btn" onclick="submitMove('Chaal')">Chaal</button>
                <button class="fold-btn" onclick="submitMove('Fold')">Fold</button>
            </div>
        </div>

        <!-- PLAYER ROSTER WITH WIN LOGS AND ADMIN PAYOUT CONTROLS -->
        <div class="card">
            <h3>Players & History</h3>
            <div id="playerList"></div>
            <button id="startHandBtn" style="background:#7c3aed; margin-top:15px; display:none;" onclick="hostResetHand()">♥ Start Next Hand ♥</button>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    // Updated API keys for Ably realtime integration
    const ABLY_SUBSCRIBE_KEY = 'fnVQhw.AEig-A:CSXDUdvE9TjLFn5etH2nQRxmL_KJDnDvR2uBMeuX1RI';
    const ABLY_ROOT_KEY = 'fnVQhw.H7cEiA:Ipz3KJ6W9-CCUl4qGuYTTSA-rkCk5gBoFZfIeDUdrQQ';

    const DEFAULT_JOINING_COINS = 0;
    const MIN_COINS_TO_START_HAND = 1;

    let ably, channel;
    let roomCode = "";
    let myClientId = "";
    let myName = "";
    let currentSelectedBet = 2; // Default tab choice
    
    // --- GAME ENGINE STATE ---
    let gameState = {
        adminId: "",       // Tracks who configured the room first
        players: [],       // Array of { id, name, wallet, blindsCount, folded, wins: 0, losses: 0 }
        pot: 0,
        turnIndex: 0,
        handActive: false
    };

    function connectToTable() {
        myName = document.getElementById('playerNameInput').value.trim();
        roomCode = document.getElementById('tableCodeInput').value.trim().toUpperCase();
        
        if(!myName || !roomCode) {
            alert("Please provide both your Name and a Table Code.");
            return;
        }

        myClientId = 'id_' + Math.random().toString(36).substr(2, 9);

        // Initialize Ably with the root API key for multi-layer support
        ably = new Ably.Realtime({ key: ABLY_ROOT_KEY, clientId: myClientId });
        channel = ably.channels.get('teen-patti-' + roomCode);

        channel.subscribe('stateUpdate', (message) => {
            gameState = message.data;
            updateGameUI();
        });

        channel.presence.subscribe('enter', (member) => {
            if(myClientId === gameState.adminId) { 
                syncJoiner(member.clientId, member.data.name);
            }
        });

        channel.presence.enter({ name: myName });

        channel.presence.get((err, members) => {
            if(!err && gameState.players.length === 0) {
                // First client inside this code room claims Admin privileges
                gameState.adminId = myClientId; 
                members.forEach(m => {
                    if(!gameState.players.find(p => p.id === m.clientId)) {
                        gameState.players.push({ id: m.clientId, name: m.data.name, wallet: DEFAULT_JOINING_COINS, blindsCount: 0, folded: false, wins: 0, losses: 0 });
                    }
                });
                broadcastState();
            }
        });

        document.getElementById('setupScreen').classList.add('hidden');
        document.getElementById('displayTableCode').innerText = roomCode;
        document.getElementById('gameScreen').classList.remove('hidden');
    }

    function syncJoiner(id, name) {
        if(!gameState.players.find(p => p.id === id)) {
            gameState.players.push({ id: id, name: name, wallet: DEFAULT_JOINING_COINS, blindsCount: 0, folded: false, wins: 0, losses: 0 });
            broadcastState();
        }
    }

    function selectBetTab(val) {
        currentSelectedBet = val;
        // Visual tab toggle update loop
        for(let i=2; i<=5; i++) {
            document.getElementById(`tab-${i}`).classList.remove('selected');
        }
        document.getElementById(`tab-${val}`).classList.add('selected');
    }

    function broadcastState() {
        channel.publish('stateUpdate', gameState);
    }

    function updateGameUI() {
        document.getElementById('potValue').innerText = gameState.pot;
        const listContainer = document.getElementById('playerList');
        listContainer.innerHTML = '';

        const isAdmin = (myClientId === gameState.adminId);
        
        // Handle global layout triggers for admin
        if(isAdmin) {
            document.getElementById('adminBadge').style.display = "inline";
            document.getElementById('startHandBtn').style.display = "block";
        }
        
        gameState.players.forEach((player, index) => {
            const badge = document.createElement('div');
            badge.className = 'player-badge' + (index === gameState.turnIndex && gameState.handActive ? ' active-turn' : '');
            
            const leftDiv = document.createElement('div');
            leftDiv.className = 'badge-left';
            
            const nameSpan = document.createElement('span');
            nameSpan.innerText = player.name;
            nameSpan.style.fontWeight = 'bold';
            
            const statsSpan = document.createElement('span');
            statsSpan.innerText = `💰 €${player.wallet} | 🎯 W:${player.wins} L:${player.losses}`;
            statsSpan.style.fontSize = '12px';
            statsSpan.style.color = '#cbd5e1';
            
            leftDiv.appendChild(nameSpan);
            leftDiv.appendChild(statsSpan);
            
            const rightDiv = document.createElement('div');
            rightDiv.style.textAlign = 'right';
            
            const statusSpan = document.createElement('span');
            if(player.folded) {
                statusSpan.innerText = '❌ FOLDED';
                statusSpan.style.color = '#ef4444';
            } else if(index === gameState.turnIndex && gameState.handActive) {
                statusSpan.innerText = '⏳ YOUR TURN';
                statusSpan.style.color = '#fbbf24';
                statusSpan.style.fontWeight = 'bold';
            } else {
                statusSpan.innerText = '⏸ Waiting';
                statusSpan.style.color = '#94a3b8';
            }
            
            rightDiv.appendChild(statusSpan);
            
            if(isAdmin) {
                const adminBtn = document.createElement('button');
                adminBtn.className = 'admin-action-btn admin-crown-btn';
                adminBtn.innerText = '⭐ Payout';
                adminBtn.onclick = () => processPayout(player.id);
                rightDiv.appendChild(adminBtn);

                const dealerBtn = document.createElement('button');
                dealerBtn.className = 'admin-action-btn dealer-coin-btn';
                dealerBtn.innerText = '💰 Add Coins';
                dealerBtn.onclick = () => loadCoinsFromDealer(player.id);
                rightDiv.appendChild(dealerBtn);
            }
            
            badge.appendChild(leftDiv);
            badge.appendChild(rightDiv);
            listContainer.appendChild(badge);
        });
        
        // Update turn indicator
        if(gameState.handActive) {
            const currentPlayer = gameState.players[gameState.turnIndex];
            if(currentPlayer.id === myClientId) {
                document.getElementById('turnIndicator').innerText = '🎪 Your Turn! Make a move...';
                document.getElementById('actionPad').classList.remove('hidden');
                // Disable Blind button once the player has used their 2 blind allowance
                const blindBtn = document.getElementById('blindActionBtn');
                blindBtn.disabled = (currentPlayer.blindsCount || 0) >= 2;
                blindBtn.title = currentPlayer.blindsCount >= 2 ? 'Blind limit reached (max 2 per hand)' : '';
            } else {
                document.getElementById('turnIndicator').innerText = `⏳ Waiting for ${currentPlayer.name}'s move...`;
                document.getElementById('actionPad').classList.add('hidden');
            }
        } else {
            document.getElementById('turnIndicator').innerText = '⏸ Waiting for next hand...';
            document.getElementById('actionPad').classList.add('hidden');
        }
    }

    function submitMove(moveType) {
        const currentPlayer = gameState.players[gameState.turnIndex];
        if(currentPlayer.id !== myClientId) {
            alert("It's not your turn!");
            return;
        }

        if(moveType === 'Blind') {
            if(currentPlayer.wallet < MIN_COINS_TO_START_HAND) {
                alert(`You need to buy at least ${MIN_COINS_TO_START_HAND} ${MIN_COINS_TO_START_HAND === 1 ? 'coin' : 'coins'} from the dealer before playing blind.`);
                return;
            }
            if((currentPlayer.blindsCount || 0) >= 2) {
                alert("You have already played 2 blinds this hand. You must Chaal or Fold.");
                return;
            }
            currentPlayer.blindsCount = (currentPlayer.blindsCount || 0) + 1;
            currentPlayer.wallet -= 1;
            gameState.pot += 1;
        } else if(moveType === 'Chaal') {
            if(currentPlayer.wallet < currentSelectedBet) {
                alert(`You need ${currentSelectedBet} coins to play chaal. Current balance: ${currentPlayer.wallet}.`);
                return;
            }
            currentPlayer.wallet -= currentSelectedBet;
            gameState.pot += currentSelectedBet;
        } else if(moveType === 'Fold') {
            currentPlayer.folded = true;
        }

        // Move to next player
        gameState.turnIndex = (gameState.turnIndex + 1) % gameState.players.length;
        broadcastState();
    }

    function hostResetHand() {
        if(myClientId !== gameState.adminId) {
            alert("Only admin can reset the hand!");
            return;
        }

        const playersWithoutCoins = gameState.players.filter(p => p.wallet < MIN_COINS_TO_START_HAND);
        if(playersWithoutCoins.length > 0) {
            alert(`Players need to buy coins from the dealer before starting: ${playersWithoutCoins.map(p => p.name).join(', ')}`);
            return;
        }

        gameState.handActive = true;
        gameState.turnIndex = 0;
        gameState.pot = 0;
        gameState.players.forEach(p => { p.folded = false; p.blindsCount = 0; });
        broadcastState();
    }

    function loadCoinsFromDealer(playerId) {
        if(myClientId !== gameState.adminId) {
            alert("Only admin can add dealer coins!");
            return;
        }

        const player = gameState.players.find(p => p.id === playerId);
        if(!player) return;

        const promptValue = prompt(`Enter coins purchased for ${player.name}:`, '100');
        if(promptValue === null) {
            return;
        }

        const amount = Number(promptValue);
        if(Number.isNaN(amount)) {
            alert("Enter a numeric whole coin amount greater than 0.");
            return;
        }

        if(!Number.isInteger(amount) || amount <= 0) {
            alert("Enter a valid whole coin amount greater than 0.");
            return;
        }

        player.wallet += amount;
        broadcastState();
    }

    function processPayout(winnerId) {
        if(myClientId !== gameState.adminId) {
            alert("Only admin can process payouts!");
            return;
        }

        const winner = gameState.players.find(p => p.id === winnerId);
        if(!winner) return;

        winner.wallet += gameState.pot;
        winner.wins += 1;
        gameState.players.forEach(p => {
            if(!p.folded && p.id !== winnerId) p.losses += 1;
        });

        gameState.pot = 0;
        gameState.handActive = false;
        broadcastState();
    }

    // Initialize UI on load
    updateGameUI();
</script>

</body>
</html>
